name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          java-version: '17'

      - name: Build with Maven
        run: mvn clean install

      - name: Run tests
        run: mvn test

      - name: Build Docker images
        run: |
          docker build -t todo-service ./todo-service
          docker build -t user-service ./user-service
          docker build -t api-gateway ./api-gateway
          docker build -t notification-service ./notification-service

      - name: Push Docker images
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push todo-service
          docker push user-service
          docker push api-gateway
          docker push notification-service

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployments/todo-service-deployment.yaml
          kubectl apply -f k8s/deployments/user-service-deployment.yaml
          kubectl apply -f k8s/deployments/api-gateway-deployment.yaml
          kubectl apply -f k8s/deployments/notification-service-deployment.yaml

      - name: Notify deployment success
        run: echo "Deployment to Kubernetes successful!"