apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todo-platform-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: todo-platform.example.com
      http:
        paths:
          - path: /api/todos
            pathType: Prefix
            backend:
              service:
                name: todo-service-svc
                port:
                  number: 80
          - path: /api/users
            pathType: Prefix
            backend:
              service:
                name: user-service-svc
                port:
                  number: 80
          - path: /api/notifications
            pathType: Prefix
            backend:
              service:
                name: notification-service-svc
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway-svc
                port:
                  number: 80